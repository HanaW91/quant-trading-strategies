<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quant Strategy Results</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow" id="marketEyebrow">US and Korean Markets</p>
        <h1 id="pageTitle">Strategy Results</h1>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span id="refreshStatus">Local backtest dashboard</span>
        <button class="icon-button" id="refreshButton" type="button" title="Refresh prices">Refresh</button>
        <button class="icon-button" id="languageButton" type="button" title="Switch language">繁中</button>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="Dashboard controls">
        <div class="control-group">
          <span class="control-label" id="strategyLabel">Strategy</span>
          <div class="segmented" id="strategyTabs"></div>
          <p class="control-description" id="strategyDescription"></p>
        </div>
        <div class="control-group">
          <span class="control-label" id="tickerLabel">Ticker</span>
          <div class="segmented compact" id="tickerTabs"></div>
        </div>
      </section>

      <section class="summary-band">
        <div>
          <p class="label" id="dateRange">Loading</p>
          <h2 id="selectionTitle">Strategy Dashboard</h2>
        </div>
        <div class="quick-stats" id="quickStats"></div>
      </section>

      <section class="metric-grid" id="metricGrid"></section>

      <section class="chart-grid">
        <article class="panel wide">
          <div class="panel-heading">
            <div>
              <p class="label" id="equityCurveLabel">Equity Curve</p>
              <h3 id="equityTitle">Portfolio vs Market</h3>
            </div>
            <div class="legend" id="equityLegend"></div>
          </div>
          <div class="canvas-wrap">
            <canvas id="equityChart" width="1200" height="520"></canvas>
          </div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="label" id="exposureLabel">Exposure</p>
              <h3 id="activeSignalTitle">Active Signal</h3>
            </div>
          </div>
          <div class="canvas-wrap small">
            <canvas id="signalChart" width="700" height="420"></canvas>
          </div>
        </article>
      </section>

      <section class="panel image-panel">
        <div class="panel-heading">
          <div>
            <p class="label" id="generatedOutputLabel">Generated Output</p>
            <h3 id="signalChartTitle">Signal Chart</h3>
          </div>
          <a class="file-link" id="chartLink" href="#">Open PNG</a>
        </div>
        <img id="signalImage" alt="Strategy signal chart" />
      </section>
    </main>

    <script src="app.js?v=20260512-korea-improved" charset="utf-8"></script>
  </body>
</html>
